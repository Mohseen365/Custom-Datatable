<template>
    <lightning-card title="Data Table">

        <div class="slds-p-around_medium slds-grid slds-wrap slds-gutters">

            <div class="slds-col slds-size_1-of-2">
                <lightning-combobox
                    label="Select Object"
                    value={objectName}
                    options={objectOptions}
                    onchange={handleObjectChange}>
                </lightning-combobox>
            </div>
            
            <div class="slds-col slds-size_1-of-2">
                <lightning-input
                    type="number"
                    label="Limit"
                    value={limitSize}
                    onchange={handleLimitChange}>
                </lightning-input>
            </div>
            
            <div class="slds-col slds-size_1-of-1">
                <lightning-dual-listbox
                    label="Select Fields"
                    source-label="Available Fields"
                    selected-label="Selected Fields"
                    options={fieldOptions}
                    value={selectedFields}
                    onchange={handleFieldSelection}>
                </lightning-dual-listbox>
            </div>

            <div class="slds-box slds-m-top_large filter-section">

                <div class="slds-text-heading_small slds-m-bottom_medium">
                    Filter Records
                </div>

                <div class="slds-m-bottom_large">
                    <lightning-radio-group
                        name="logicType"
                        label="Condition Logic"
                        options={logicOptions}
                        value={logicType}
                        onchange={handleLogicChange}>
                    </lightning-radio-group>
                </div>

                <div class="slds-grid slds-grid_vertical slds-gutters_medium">

                    <template for:each={filters} for:item="filter">
                        <div key={filter.id} class="slds-box slds-m-bottom_medium filter-card">

                            <div class="slds-grid slds-wrap slds-gutters_medium">

                                <div class="slds-col slds-size_1-of-1 slds-medium-size_4-of-12">
                                    <lightning-combobox
                                        label="Field"
                                        value={filter.field}
                                        options={fieldOptions}
                                        data-id={filter.id}
                                        onchange={handleFilterField}>
                                    </lightning-combobox>
                                </div>

                                <div class="slds-col slds-size_1-of-1 slds-medium-size_3-of-12">
                                    <lightning-combobox
                                        label="Operator"
                                        value={filter.operator}
                                        options={operators}
                                        data-id={filter.id}
                                        onchange={handleFilterOperator}>
                                    </lightning-combobox>
                                </div>

                                <div class="slds-col slds-size_1-of-1 slds-medium-size_4-of-12">
                                    <lightning-input
                                        label="Value"
                                        value={filter.value}
                                        data-id={filter.id}
                                        onchange={handleFilterValue}>
                                    </lightning-input>
                                </div>

                                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-12 slds-align_absolute-center">
                                    <lightning-button-icon
                                        icon-name="utility:close"
                                        alternative-text="Remove"
                                        variant="bare"
                                        data-id={filter.id}
                                        onclick={removeFilter}>
                                    </lightning-button-icon>
                                </div>

                            </div>
                        </div>
                    </template>

                </div>

                <div class="slds-m-top_medium">
                    <lightning-button
                        label="Add Condition"
                        icon-name="utility:add"
                        variant="neutral"
                        onclick={addFilter}>
                    </lightning-button>
                </div>

            </div>

            
            <div class="slds-col slds-size_1-of-1 slds-m-top_small">
                <lightning-button
                    label="Load Data"
                    variant="brand"
                    onclick={loadData}>
                </lightning-button>
            </div>

        </div>

        <template if:true={data}>
            <c-data-table 
                records={data} 
                columns={columns}
                object-name={request.objectName}
                onrefreshdata={refreshData}
                oncreaterecord={handleCreate}
                ondeleterecord={handleDelete}
                onbulkupdate={handleBulkUpdate}
            >
            </c-data-table>
        </template>
        <template if:true={error}>
            <p class="slds-text-color_error slds-var-p-around_small">Error: {error}</p>
        </template>
    </lightning-card>
</template>
