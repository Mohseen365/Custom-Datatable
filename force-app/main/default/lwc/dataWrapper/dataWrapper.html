<template>
    <lightning-card title="Data Table">

        <div class="slds-p-around_medium slds-grid slds-wrap slds-gutters">

            <div class="slds-col slds-size_1-of-2">
                <lightning-combobox
                    label="Select Object"
                    value={objectName}
                    options={objectOptions}
                    onchange={handleObjectChange}>
                </lightning-combobox>
            </div>

            <div class="slds-col slds-size_1-of-2">
                <lightning-input
                    label="Fields (comma separated)"
                    value={fieldInput}
                    onchange={handleFieldChange}>
                </lightning-input>
            </div>

            <div class="slds-col slds-size_1-of-2">
                <lightning-input
                    label="Where Clause (Optional)"
                    value={whereClause}
                    onchange={handleWhereChange}>
                </lightning-input>
            </div>
            
            <div class="slds-col slds-size_1-of-2">
                <lightning-input
                    type="number"
                    label="Limit"
                    value={limitSize}
                    onchange={handleLimitChange}>
                </lightning-input>
            </div>
            
            <div class="slds-col slds-size_1-of-1 slds-m-top_small">
                <lightning-button
                    label="Load Data"
                    variant="brand"
                    onclick={loadData}>
                </lightning-button>
            </div>

        </div>

        <template if:true={data}>
            <c-data-table 
                records={data} 
                columns={columns}
                object-name={request.objectName}
                onrefreshdata={refreshData}
                oncreaterecord={handleCreate}
                ondeleterecord={handleDelete}
                onbulkupdate={handleBulkUpdate}
            >
            </c-data-table>
        </template>
        <template if:true={error}>
            <p class="slds-text-color_error slds-var-p-around_small">Error: {error}</p>
        </template>
    </lightning-card>
</template>
